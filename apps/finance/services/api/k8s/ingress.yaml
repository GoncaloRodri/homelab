apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
  namespace: finance
spec:
  ingressClassName: traefik
  rules:
    - host: finance.homelab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  name: http
