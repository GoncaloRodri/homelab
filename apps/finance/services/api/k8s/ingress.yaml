apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
  namespace: finance
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - finance.gugagr.xyz
  rules:
    - host: finance.gugagr.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  name: http
