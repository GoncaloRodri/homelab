apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: finance
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      imagePullSecrets:
        - name: gitea-registry
      containers:
        - name: api
          image: homelab/finance-api
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: LOG_LEVEL
              value: "info"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "jaeger.monitoring.svc:4317"
            - name: BASE_URL
              value: "https://finance.gugagr.xyz"
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: finance-api-secrets
                  key: ADMIN_EMAIL
                  optional: true
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: finance-api-secrets
                  key: ADMIN_PASSWORD
                  optional: true
          envFrom:
            - secretRef:
                name: mongodb-shared-config
            - secretRef:
                name: finance-api-secrets
                optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
