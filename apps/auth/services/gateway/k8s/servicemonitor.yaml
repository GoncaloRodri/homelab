apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  namespace: auth
  name: gateway
  labels:
    release: kps
spec:
  jobLabel: app
  selector:
    matchLabels:
      app: gateway
  namespaceSelector:
    matchNames:
      - auth
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
