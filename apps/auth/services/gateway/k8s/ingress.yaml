apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: auth
  name: gateway
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - auth.gugagr.xyz
  rules:
    - host: auth.gugagr.xyz
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  name: http
          - path: /verify
            pathType: Exact
            backend:
              service:
                name: gateway
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  name: http
