apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: gateway
build:
  artifacts:
    - image: homelab/gateway
      context: ../../../../
      docker:
        dockerfile: apps/auth/services/gateway/Dockerfile
manifests:
  rawYaml:
    - k8s/*.yaml
deploy:
  kubectl: {}
profiles:
  - name: local
    activation:
      - kubeContext: k3d-homelab
    build:
      local:
        push: false
  - name: ci
    build:
      local:
        push: true
      tagPolicy:
        gitCommit: {}
